version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: db_hw4
    environment:
      POSTGRES_DB: dbii_hw4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data  # Requerido en 4.1
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dbii_hw4"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: api_hw4
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dbii_hw4
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      # Ajustes de rendimiento para evitar errores 500 bajo carga
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 40
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 10
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
    depends_on:
      postgres:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: exporter_hw4
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:root@postgres:5432/dbii_hw4?sslmode=disable"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_hw4
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_hw4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana # Requerido en 4.1
    depends_on:
      - prometheus

volumes:
  pg_data:
  grafana_data: